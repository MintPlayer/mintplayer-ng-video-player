    # Publish to GitHub Container Registry
    - name: Authenticate with GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    ## Angular app
    - name: Extract tags/labels
      id: meta-ghcr-angular
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: |
          ghcr.io/${{ github.repository }}-angular

    - name: Publish to Github Container Registry
      id: push-ghcr-angular
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/angular-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr-angular.outputs.tags }}
        labels: ${{ steps.meta-ghcr-angular.outputs.labels }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}-angular
        subject-digest: ${{ steps.push-ghcr-angular.outputs.digest }}
        push-to-registry: true

    ## React app
    - name: Extract tags/labels
      id: meta-ghcr-react
      uses: docker/metadata-action@v5
      with:
        github-token: ${{ github.token }}
        images: |
          ghcr.io/${{ github.repository }}-react

    - name: Publish to Github Container Registry
      id: push-ghcr-react
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/react-demo/Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr-react.outputs.tags }}
        labels: ${{ steps.meta-ghcr-react.outputs.labels }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ghcr.io/${{ github.repository }}-react
        subject-digest: ${{ steps.push-ghcr-react.outputs.digest }}
        push-to-registry: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /var/www/ng-video-player-demo
            cd /var/www/ng-video-player-demo

            # Generate .env from GitHub Secrets (ready for future secrets)
            cat > .env << EOF
            # Future secrets go here, e.g.:
            # SECRET_KEY=value
            EOF

            # Download latest docker-compose.yml from the repository
            rm -f docker-compose.yml
            curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/master/docker-compose.yml

            # Log in to GHCR using the workflow's GITHUB_TOKEN
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose --env-file .env pull

            # Stop and remove old containers
            docker compose --env-file .env down

            # Start new containers
            docker compose --env-file .env up -d

            # Clean up old images
            docker image prune -f